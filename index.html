<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>RegistrationForm</title>
</head>
<body>
    <div id="right-side">
        <h1 id="heading">Registration Form</h1>
    </div>
    <div id="left-side">
        <p id="msg">
        Caution:This is not a real online service.
        This registration form is for practice, Register if you want to get insane luck in your life.
        </p>
        <form action="https://youtube.com/shorts/23SoRjexSvo?si=dLI-15rrkV7FoVjS" method="get" target="_blank">
            <div class="form-row">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" placeholder="eg.Sahil" required>
                </div>
                <div class="form-group">
                    <label for="sname">Second Name</label>
                    <input type="text" id="sname" name="sname" placeholder="eg.Kant">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="eg.example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="number" id="phno" name="phno" placeholder="eg.+911234567890" requierd>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="pass" name="pass" placeholder="eg.123456" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" required>
                </div>
            </div> 
            <button type="submit">Gain Insane Luck</button>
            <p>Already have Luck?<a href="https://youtube.com/shorts/23SoRjexSvo?si=dLI-15rrkV7FoVjS" target="_blank">Gain More Luck!</a></p>
        </form>
        <script src="script.js"></script>
    </div>
</body>
</html>
